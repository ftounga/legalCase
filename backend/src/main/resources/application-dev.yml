spring:
  datasource:
    url: jdbc:h2:mem:legalcasedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

logging:
  level:
    fr.ailegalcase: DEBUG
    liquibase: INFO

storage:
  s3:
    endpoint: http://localhost:9000
    access-key: minio
    secret-key: minio123
    bucket: legalcase-dev
    path-style-access: true

# OAuth2 credentials — variables d'environnement requises en dev :
# GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET  → Google Cloud Console
# MICROSOFT_CLIENT_ID / MICROSOFT_CLIENT_SECRET → Azure App Registrations
# Définir dans un fichier .env local (voir .env.example) — ne jamais committer ces valeurs
