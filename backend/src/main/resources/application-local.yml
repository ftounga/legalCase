spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/legalcasedb
    driver-class-name: org.postgresql.Driver
    username: legalcase
    password: legalcase
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6

storage:
  s3:
    endpoint: http://localhost:9000
    access-key: minio
    secret-key: minio123
    bucket: legalcase-dev
    path-style-access: true

logging:
  level:
    fr.ailegalcase: DEBUG
    liquibase: INFO
