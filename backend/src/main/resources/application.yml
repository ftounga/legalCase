spring:
  application:
    name: legalcase-backend
  profiles:
    active: dev
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: openid, email, profile
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: http://localhost:4200
  mail:
    enabled: false
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  stripe:
    enabled: false
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    price-id-starter: ${STRIPE_PRICE_ID_STARTER:}
    price-id-pro: ${STRIPE_PRICE_ID_PRO:}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENV:dev}
  traces-sample-rate: 0

anthropic:
  api-key: ${ANTHROPIC_API_KEY:change-me}

storage:
  s3:
    endpoint: ${S3_ENDPOINT:}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minio}
    secret-key: ${S3_SECRET_KEY:minio123}
    bucket: ${S3_BUCKET:legalcase-dev}
    path-style-access: ${S3_PATH_STYLE_ACCESS:true}

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api/actuator
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
