name: K8s Deploy (staging)

on:
  push:
    branches: [master]
    paths:
      - 'k8s/**'
      - '.github/workflows/k8s-deploy.yml'

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-3
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy:
    name: Apply K8s manifests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Apply K8s manifests to staging
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Lire les images courantes depuis le cluster (pas de rebuild)
          CURRENT_BACKEND=$(kubectl get deployment legalcase-backend -n staging \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            || echo "$ECR_REGISTRY/legalcase-backend:latest")
          CURRENT_FRONTEND=$(kubectl get deployment legalcase-frontend -n staging \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            || echo "$ECR_REGISTRY/legalcase-frontend:latest")

          sed -i "s|REGISTRY_PLACEHOLDER/legalcase-backend:BACKEND_IMAGE_TAG|$CURRENT_BACKEND|g" \
            k8s/base/backend/deployment.yaml
          sed -i "s|REGISTRY_PLACEHOLDER/legalcase-frontend:FRONTEND_IMAGE_TAG|$CURRENT_FRONTEND|g" \
            k8s/base/frontend/deployment.yaml
          sed -i "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" k8s/base/backend/deployment.yaml
          sed -i "s|IRSA_ROLE_ARN_PLACEHOLDER|${{ secrets.IRSA_BACKEND_ROLE_ARN }}|g" \
            k8s/base/backend/deployment.yaml

          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/legalcase-backend -n staging --timeout=120s
          kubectl rollout status deployment/legalcase-frontend -n staging --timeout=60s

      - name: Health check
        run: |
          sleep 10
          curl -sf https://staging.legalcase.ng-itconsulting.com/api/actuator/health \
            || (echo "Health check failed after k8s deploy" && exit 1)
