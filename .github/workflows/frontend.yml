name: Frontend CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: legalcase-frontend
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npx ng test --watch=false --browsers=ChromeHeadless

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG::7}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Deploy to staging
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHORT_SHA: ${{ steps.build.outputs.short_sha }}
        run: |
          sed -i "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" k8s/base/frontend/deployment.yaml
          sed -i "s|FRONTEND_IMAGE_TAG|$SHORT_SHA|g" k8s/base/frontend/deployment.yaml

          CURRENT_BACKEND=$(kubectl get deployment legalcase-backend -n staging \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            || echo "$ECR_REGISTRY/legalcase-backend:latest")
          sed -i "s|REGISTRY_PLACEHOLDER/legalcase-backend:BACKEND_IMAGE_TAG|$CURRENT_BACKEND|g" \
            k8s/base/backend/deployment.yaml
          sed -i "s|IRSA_ROLE_ARN_PLACEHOLDER|${{ secrets.IRSA_BACKEND_ROLE_ARN }}|g" \
            k8s/base/backend/deployment.yaml

          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/legalcase-frontend -n staging --timeout=60s

      - name: Health check
        run: |
          sleep 10
          curl -sf https://staging.legalcase.ng-itconsulting.com/api/actuator/health \
            || (echo "Health check failed after deploy" && exit 1)


