name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      backend_tag:
        description: 'Backend image tag (ex: a1b2c3d)'
        required: true
      frontend_tag:
        description: 'Frontend image tag (ex: a1b2c3d)'
        required: true
      confirm:
        description: 'Tapez "PRODUCTION" pour confirmer'
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-3
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'PRODUCTION'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create/update backend K8s secret (production)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID_STARTER: ${{ secrets.STRIPE_PRICE_ID_STARTER }}
          STRIPE_PRICE_ID_PRO: ${{ secrets.STRIPE_PRICE_ID_PRO }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_URL: ${{ secrets.DB_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          kubectl create secret generic backend-secrets \
            --namespace=production \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --from-literal=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --from-literal=GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            --from-literal=MICROSOFT_CLIENT_ID="$MICROSOFT_CLIENT_ID" \
            --from-literal=MICROSOFT_CLIENT_SECRET="$MICROSOFT_CLIENT_SECRET" \
            --from-literal=STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            --from-literal=STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            --from-literal=STRIPE_PRICE_ID_STARTER="$STRIPE_PRICE_ID_STARTER" \
            --from-literal=STRIPE_PRICE_ID_PRO="$STRIPE_PRICE_ID_PRO" \
            --from-literal=MAIL_HOST="$MAIL_HOST" \
            --from-literal=MAIL_USERNAME="$MAIL_USERNAME" \
            --from-literal=MAIL_PASSWORD="$MAIL_PASSWORD" \
            --from-literal=MAIL_FROM="$MAIL_FROM" \
            --from-literal=SPRING_DATASOURCE_USERNAME="$DB_USERNAME" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="$DB_PASSWORD" \
            --from-literal=SPRING_DATASOURCE_URL="$DB_URL" \
            --from-literal=S3_BUCKET="$S3_BUCKET" \
            --from-literal=S3_ACCESS_KEY="$S3_ACCESS_KEY" \
            --from-literal=S3_SECRET_KEY="$S3_SECRET_KEY" \
            --from-literal=SENTRY_DSN="$SENTRY_DSN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update RabbitMQ K8s secret (production)
        env:
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        run: |
          kubectl create secret generic rabbitmq-secrets \
            --namespace=production \
            --from-literal=RABBITMQ_USER="$RABBITMQ_USER" \
            --from-literal=RABBITMQ_PASSWORD="$RABBITMQ_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to production
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          BACKEND_TAG: ${{ github.event.inputs.backend_tag }}
          FRONTEND_TAG: ${{ github.event.inputs.frontend_tag }}
        run: |
          find k8s/ -name "*.yaml" | xargs sed -i \
            "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g"
          find k8s/ -name "*.yaml" | xargs sed -i \
            "s|IRSA_ROLE_ARN_PLACEHOLDER|${{ secrets.IRSA_BACKEND_ROLE_ARN }}|g"

          sed -i "s|legalcase-backend:BACKEND_IMAGE_TAG|legalcase-backend:$BACKEND_TAG|g" \
            k8s/base/backend/deployment.yaml
          sed -i "s|legalcase-frontend:FRONTEND_IMAGE_TAG|legalcase-frontend:$FRONTEND_TAG|g" \
            k8s/base/frontend/deployment.yaml

          kubectl apply -k k8s/overlays/production/
          kubectl rollout status deployment/legalcase-backend -n production --timeout=180s || \
            (kubectl describe pods -n production -l app=legalcase-backend && \
             kubectl logs -n production -l app=legalcase-backend --tail=50 && exit 1)
          kubectl rollout status deployment/legalcase-frontend -n production --timeout=60s

      - name: Health check
        run: |
          sleep 10
          curl -sf https://legalcase.ng-itconsulting.com/api/actuator/health \
            || (echo "Health check failed after production deploy" && exit 1)
