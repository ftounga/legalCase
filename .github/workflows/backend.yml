name: Backend CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: legalcase-backend
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: cd backend && ./mvnw test -q

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA=${IMAGE_TAG::7}
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA \
                       -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Create/update backend K8s secret
        env:
          NAMESPACE: staging
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
          STRIPE_PRICE_ID_STARTER: ${{ secrets.STRIPE_PRICE_ID_STARTER_TEST }}
          STRIPE_PRICE_ID_PRO: ${{ secrets.STRIPE_PRICE_ID_PRO_TEST }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_URL: ${{ secrets.DB_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        run: |
          kubectl create secret generic backend-secrets \
            --namespace=$NAMESPACE \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --from-literal=GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
            --from-literal=GOOGLE_CLIENT_SECRET="$GOOGLE_CLIENT_SECRET" \
            --from-literal=STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
            --from-literal=STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
            --from-literal=STRIPE_PRICE_ID_STARTER="$STRIPE_PRICE_ID_STARTER" \
            --from-literal=STRIPE_PRICE_ID_PRO="$STRIPE_PRICE_ID_PRO" \
            --from-literal=MAIL_HOST="$MAIL_HOST" \
            --from-literal=MAIL_USERNAME="$MAIL_USERNAME" \
            --from-literal=MAIL_PASSWORD="$MAIL_PASSWORD" \
            --from-literal=MAIL_FROM="$MAIL_FROM" \
            --from-literal=SPRING_DATASOURCE_USERNAME="$DB_USERNAME" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="$DB_PASSWORD" \
            --from-literal=SPRING_DATASOURCE_URL="$DB_URL" \
            --from-literal=S3_BUCKET="$S3_BUCKET" \
            --from-literal=SPRING_RABBITMQ_USERNAME="$RABBITMQ_USER" \
            --from-literal=SPRING_RABBITMQ_PASSWORD="$RABBITMQ_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update RabbitMQ K8s secret
        env:
          NAMESPACE: staging
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        run: |
          kubectl create secret generic rabbitmq-secrets \
            --namespace=$NAMESPACE \
            --from-literal=RABBITMQ_USER="$RABBITMQ_USER" \
            --from-literal=RABBITMQ_PASSWORD="$RABBITMQ_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to staging
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHORT_SHA: ${{ steps.build.outputs.short_sha }}
        run: |
          sed -i "s|REGISTRY_PLACEHOLDER|$ECR_REGISTRY|g" k8s/base/backend/deployment.yaml
          sed -i "s|BACKEND_IMAGE_TAG|$SHORT_SHA|g" k8s/base/backend/deployment.yaml
          sed -i "s|IRSA_ROLE_ARN_PLACEHOLDER|${{ secrets.IRSA_BACKEND_ROLE_ARN }}|g" k8s/base/backend/deployment.yaml

          CURRENT_FRONTEND=$(kubectl get deployment legalcase-frontend -n staging \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null \
            || echo "$ECR_REGISTRY/legalcase-frontend:latest")
          sed -i "s|REGISTRY_PLACEHOLDER/legalcase-frontend:FRONTEND_IMAGE_TAG|$CURRENT_FRONTEND|g" \
            k8s/base/frontend/deployment.yaml

          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/legalcase-backend -n staging --timeout=120s

      - name: Health check
        run: |
          sleep 10
          curl -sf https://staging.legalcase.ng-itconsulting.com/api/actuator/health \
            || (echo "Health check failed after deploy" && exit 1)

