version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legalcase-postgres
    environment:
      POSTGRES_DB: legalcasedb
      POSTGRES_USER: legalcase
      POSTGRES_PASSWORD: legalcase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalcase -d legalcasedb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
