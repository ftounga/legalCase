apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

namePrefix: ""

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - APP_FRONTEND_URL=https://staging.legalcase.ng-itconsulting.com
      - SENTRY_ENV=staging

patches:
  - path: service-account-patch.yaml
    target:
      kind: ServiceAccount
      name: legalcase-backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: legalcase-backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: legalcase-frontend

commonLabels:
  environment: staging
