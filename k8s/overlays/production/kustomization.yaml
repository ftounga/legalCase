apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
  - ../../base

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - APP_FRONTEND_URL=https://legalcase.ng-itconsulting.com
      - SENTRY_ENV=production

patches:
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: legalcase-ingress
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: legalcase-backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: legalcase-frontend

commonLabels:
  environment: production
