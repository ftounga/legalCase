apiVersion: apps/v1
kind: Deployment
metadata:
  name: legalcase-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legalcase-frontend
  template:
    metadata:
      labels:
        app: legalcase-frontend
    spec:
      containers:
        - name: frontend
          image: REGISTRY_PLACEHOLDER/legalcase-frontend:IMAGE_TAG
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_URL
              value: "http://legalcase-backend:8080"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
