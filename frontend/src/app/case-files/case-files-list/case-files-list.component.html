<div class="page-header">
  <h1 class="page-title">Dossiers</h1>
  <button mat-flat-button color="primary" (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Nouveau dossier
  </button>
</div>

<mat-table [dataSource]="dataSource" class="case-files-table">
  <ng-container matColumnDef="title">
    <mat-header-cell *matHeaderCellDef>Titre</mat-header-cell>
    <mat-cell *matCellDef="let row">
      <a [routerLink]="['/case-files', row.id]" class="case-file-link">{{ row.title }}</a>
    </mat-cell>
  </ng-container>

  <ng-container matColumnDef="legalDomain">
    <mat-header-cell *matHeaderCellDef>Domaine</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.legalDomain }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="status">
    <mat-header-cell *matHeaderCellDef>Statut</mat-header-cell>
    <mat-cell *matCellDef="let row">
      <span class="badge" [ngClass]="statusClass(row.status)">{{ statusLabel(row.status) }}</span>
    </mat-cell>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <mat-header-cell *matHeaderCellDef>Créé le</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.createdAt | date:'dd/MM/yyyy' }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="actions">
    <mat-header-cell *matHeaderCellDef></mat-header-cell>
    <mat-cell *matCellDef="let row">
      <button mat-icon-button [routerLink]="['/case-files', row.id]" aria-label="Voir le dossier">
        <mat-icon>arrow_forward</mat-icon>
      </button>
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></mat-row>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">
      Aucun dossier. Créez votre premier dossier avec le bouton ci-dessus.
    </td>
  </tr>
</mat-table>

<mat-paginator
  [length]="totalElements"
  [pageSize]="pageSize"
  [pageSizeOptions]="[10, 20, 50]"
  (page)="onPageChange($event)">
</mat-paginator>
