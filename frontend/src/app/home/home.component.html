<div class="home-container">
  <mat-card class="home-card">
    <div class="home-card__logo">
      <img src="legalcase-logo.png" alt="AI LegalCase" class="logo-img" />
    </div>

    <mat-card-content>
      <p class="home-card__subtitle">Plateforme LegalTech pour avocats</p>

      <div class="backend-status">
        <p class="backend-status__label">Statut du backend</p>

        <ng-container *ngIf="health$ | async as health; else loading">
          <ng-container *ngIf="health; else error">
            <div class="status-ok">
              <mat-icon>check_circle</mat-icon>
              <span>{{ health.message }}</span>
            </div>
          </ng-container>
          <ng-template #error>
            <div class="status-error">
              <mat-icon>error</mat-icon>
              <span>Backend inaccessible — démarrez Spring Boot sur le port 8080</span>
            </div>
          </ng-template>
        </ng-container>

        <ng-template #loading>
          <mat-spinner diameter="32"></mat-spinner>
        </ng-template>
      </div>
    </mat-card-content>
  </mat-card>
</div>
