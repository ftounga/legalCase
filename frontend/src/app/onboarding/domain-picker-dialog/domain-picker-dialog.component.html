<h2 mat-dialog-title class="dialog-title">Votre domaine principal</h2>
<p class="dialog-subtitle">Choisissez le domaine juridique de <strong>{{ data.workspaceName }}</strong></p>

<mat-dialog-content class="dialog-content">
  <div class="domains-grid">
    @for (domain of domains; track domain.key) {
      <div
        class="domain-tile"
        [class.domain-tile--active]="selected === domain.key"
        [style.--tile-color]="domain.color"
        [style.--tile-bg-color]="domain.bgColor"
        (click)="selected = domain.key"
      >
        <mat-icon class="domain-icon">{{ domain.icon }}</mat-icon>
        <div class="domain-label">{{ domain.label }}</div>
        <div class="domain-subtitle">{{ domain.subtitle }}</div>
      </div>
    }
  </div>

  <div class="country-picker">
    <div class="country-picker-label">Pays</div>
    <div class="country-buttons">
      @for (country of countries; track country.key) {
        <button
          mat-button
          class="country-btn"
          [class.country-btn--active]="selectedCountry === country.key"
          [style.--country-color]="selectedDomainColor"
          [style.--country-bg-color]="selectedDomainBgColor"
          (click)="selectedCountry = country.key"
        >
          {{ country.label }}
        </button>
      }
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" [disabled]="!canConfirm" (click)="confirm()">
    Confirmer
  </button>
</mat-dialog-actions>
